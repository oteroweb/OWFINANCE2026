<style>
      .glass-scrim {
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(16px);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface font-body selection:bg-primary/30 overflow-hidden h-screen w-screen flex flex-col items-center justify-center">
<!-- Background Mockup Content (Simulated Home Screen) -->
<div class="absolute inset-0 z-0 opacity-40 pointer-events-none">
<header class="flex justify-between items-center px-6 h-16 w-full">
<span class="text-xl font-headline font-extrabold text-primary">Liquid Editorial</span>
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-outline">person</span>
</div>
</header>
<div class="p-6 space-y-8">
<div class="space-y-2">
<span class="text-xs font-label uppercase tracking-widest text-outline">Total Balance</span>
<h1 class="text-5xl font-headline font-bold text-on-surface">$24,850.00</h1>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="h-32 bg-surface-container rounded-xl"></div>
<div class="h-32 bg-surface-container rounded-xl"></div>
</div>
<div class="h-64 bg-surface-container-low rounded-xl w-full"></div>
</div>
</div>
<!-- 60% Black Scrim Overlay -->
<div class="fixed inset-0 glass-scrim z-10"></div>
<!-- Bottom Sheet Container -->
<div class="fixed bottom-0 left-0 right-0 z-20 flex flex-col items-center">
<!-- Bottom Sheet Surface (#1A1A2E - mapped to surface-container-low/high hybrid) -->
<div class="w-full max-w-md bg-[#1A1A2E] rounded-t-[3rem] shadow-[0px_-10px_40px_rgba(0,30,47,0.15)] border-t border-[#2D3449] flex flex-col p-6 pb-28 min-h-[397px]">
<!-- Handle -->
<div class="w-12 h-1.5 bg-outline-variant/30 rounded-full self-center mb-8"></div>
<!-- Action Grid (2 rows x 3 cols) -->
<div class="grid grid-cols-3 gap-4 mb-6">
<!-- Gasto -->
<button class="bg-surface-container-high rounded-xl p-4 flex flex-col items-center gap-3 active:scale-95 transition-transform">
<div class="w-12 h-12 rounded-full bg-[#EF4444]/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[#EF4444]" style="font-variation-settings: 'FILL' 1;">outbound</span>
</div>
<span class="text-sm font-label font-medium text-slate-200">Gasto</span>
</button>
<!-- Ingreso -->
<button class="bg-surface-container-high rounded-xl p-4 flex flex-col items-center gap-3 active:scale-95 transition-transform">
<div class="w-12 h-12 rounded-full bg-[#10B981]/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[#10B981]" style="font-variation-settings: 'FILL' 1;">transit_enterexit</span>
</div>
<span class="text-sm font-label font-medium text-slate-200">Ingreso</span>
</button>
<!-- Transferir -->
<button class="bg-surface-container-high rounded-xl p-4 flex flex-col items-center gap-3 active:scale-95 transition-transform">
<div class="w-12 h-12 rounded-full bg-[#8B5CF6]/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[#8B5CF6]" style="font-variation-settings: 'FILL' 1;">swap_horiz</span>
</div>
<span class="text-sm font-label font-medium text-slate-200">Transferir</span>
</button>
<!-- Voz -->
<button class="bg-surface-container-high rounded-xl p-4 flex flex-col items-center gap-3 active:scale-95 transition-transform">
<div class="w-12 h-12 rounded-full bg-[#0EA5E9]/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[#0EA5E9]" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
<span class="text-sm font-label font-medium text-slate-200">Voz</span>
</button>
<!-- Escanear -->
<button class="bg-surface-container-high rounded-xl p-4 flex flex-col items-center gap-3 active:scale-95 transition-transform">
<div class="w-12 h-12 rounded-full bg-[#FBBF24]/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[#FBBF24]" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
</div>
<span class="text-sm font-label font-medium text-slate-200">Escanear</span>
</button>
<!-- Auto IA (Gradient) -->
<button class="bg-surface-container-high rounded-xl p-4 flex flex-col items-center gap-3 active:scale-95 transition-transform relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-primary/10 to-secondary/10 opacity-50"></div>
<div class="w-12 h-12 rounded-full bg-gradient-to-br from-primary to-secondary flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<span class="text-sm font-label font-medium text-slate-200">Auto IA</span>
</button>
</div>
<!-- AI Coach Banner -->
<button class="w-full h-16 bg-gradient-to-r from-[#8B5CF6] to-[#0EA5E9] rounded-2xl flex items-center justify-center gap-3 px-6 shadow-xl shadow-primary/10 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">psychology</span>
<span class="text-white font-headline font-bold tracking-tight">Hablar con Asesor IA</span>
</button>
</div>
<!-- Bottom NavBar Overlay -->
<nav class="fixed bottom-0 left-0 w-full z-30 flex justify-around items-center px-4 pb-8 pt-4 bg-slate-900/60 backdrop-blur-xl rounded-t-[3rem] shadow-[0px_-10px_40px_rgba(0,30,47,0.08)]">
<!-- Home -->
<div class="flex flex-col items-center justify-center text-slate-500">
<span class="material-symbols-outlined text-[28px]">home</span>
<span class="font-label text-[10px] font-bold uppercase tracking-widest mt-1">Home</span>
</div>
<!-- Transactions -->
<div class="flex flex-col items-center justify-center text-slate-500">
<span class="material-symbols-outlined text-[28px]">receipt_long</span>
<span class="font-label text-[10px] font-bold uppercase tracking-widest mt-1">Trans</span>
</div>
<!-- Central Close Button -->
<div class="relative -top-6 flex flex-col items-center justify-center">
<button class="w-16 h-16 bg-surface-container-highest rounded-full flex items-center justify-center shadow-2xl ring-4 ring-primary-container shadow-primary/40 active:scale-90 duration-300">
<span class="material-symbols-outlined text-primary text-4xl">close</span>
</button>
</div>
<!-- Jars (Vaults) -->
<div class="flex flex-col items-center justify-center text-slate-500">
<span class="material-symbols-outlined text-[28px]">database</span>
<span class="font-label text-[10px] font-bold uppercase tracking-widest mt-1">Jars</span>
</div>
<!-- Settings -->
<div class="flex flex-col items-center justify-center text-slate-500">
<span class="material-symbols-outlined text-[28px]">settings</span>
<span class="font-label text-[10px] font-bold uppercase tracking-widest mt-1">Settings</span>
</div>
</nav>
</div>
